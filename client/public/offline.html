<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CDP Hub — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9fafb;
      color: #374151;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #111827; color: #f3f4f6; }
      .card { background: #1f2937; border-color: #374151; }
      p { color: #9ca3af; }
      button { background: #7c3aed; }
      button:hover { background: #6d28d9; }
    }
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 1.5rem;
      padding: 3rem 2rem;
      text-align: center;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .logo {
      width: 56px; height: 56px;
      background: #7c3aed;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: .5rem; }
    p { font-size: .9rem; color: #6b7280; line-height: 1.6; }
    button {
      margin-top: 1.5rem;
      padding: .625rem 1.5rem;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: .75rem;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">C</div>
    <h1>Du är offline</h1>
    <p>Kontrollera din internetanslutning och försök igen.</p>
    <button onclick="window.location.reload()">Försök igen</button>
  </div>
</body>
</html>
