# Render Blueprint — auto-deploys backend + database
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cdp-hub-api
    runtime: node
    region: frankfurt  # EU for low latency
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        sync: false  # Set to your Vercel URL after deploy
      - key: DATABASE_URL
        fromDatabase:
          name: cdp-hub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: cdp-hub-db
    region: frankfurt
    plan: free
    databaseName: cdp_hub
    postgresMajorVersion: 16
